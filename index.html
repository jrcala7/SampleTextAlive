<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextAlive Player</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        #player {
            width: 100%;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 80px;
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .info p {
            margin: 10px 0;
            color: #666;
        }
        .lyrics {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            min-height: 50px;
            text-align: center;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 TextAlive Player</h1>

        <div id="player"></div>

        <div class="controls">
            <button onclick="playPause()">Play/Pause</button>
            <button onclick="skipForward()">Skip Forward</button>
            <button onclick="skipBackward()">Skip Backward</button>
        </div>

        <div class="info">
            <p><strong>Song:</strong> <span id="songTitle">Loading...</span></p>
            <p><strong>Artist:</strong> <span id="artistName">Loading...</span></p>
            <p><strong>Progress:</strong> <span id="progress">0:00</span> / <span id="duration">0:00</span></p>
        </div>

        <div class="lyrics" id="lyrics">
            Lyrics will appear here...
        </div>
    </div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
    
    <script>
        let player;

        // Initialize TextAlive Player
        function initPlayer() {
            if (typeof TextAlivePlayer === 'undefined') {
                console.error("TextAlivePlayer not loaded yet");
                setTimeout(initPlayer, 100);
                return;
            }

            player = new TextAlivePlayer({
                clientToken: "bllj203yvvy66yb84",
                targetElement: document.getElementById("player"),
                options: {
                    width: "100%",
                    height: 60
                }
            });

            player.addListener({
                onAppReady: onAppReady,
                onSongReady: onSongReady,
                onPlay: onPlay,
                onPause: onPause,
                onStop: onStop,
                onTimeUpdate: onTimeUpdate,
                onChase: onChase
            });

            player.loadSong({
                songUrl: "https://www.youtube.com/watch?v=XSLhsjepelI"
            });
        }

        function onAppReady(app) {
            console.log("TextAlive app is ready");
        }

        function onSongReady(song) {
            console.log("Song is ready:", song.name);
            document.getElementById("songTitle").textContent = song.name || "Unknown";
            document.getElementById("artistName").textContent = song.artistName || "Unknown";
            document.getElementById("duration").textContent = formatTime(song.duration);
        }

        function onPlay(now) {
            console.log("Playing from:", now);
        }

        function onPause(now) {
            console.log("Paused at:", now);
        }

        function onStop(now) {
            console.log("Stopped at:", now);
        }

        function onTimeUpdate(now) {
            document.getElementById("progress").textContent = formatTime(now);

            // Display current lyrics if available
            if (player.song && player.song.lyrics) {
                const lyrics = player.song.lyrics;
                let currentLyric = "";

                for (let i = 0; i < lyrics.length; i++) {
                    if (lyrics[i].startTime <= now && now < lyrics[i].endTime) {
                        currentLyric = lyrics[i].text;
                        break;
                    }
                }

                document.getElementById("lyrics").textContent = currentLyric || "♪";
            }
        }

        function onChase(now) {
            console.log("Chasing to:", now);
        }

        function formatTime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes}:${secs.toString().padStart(2, "0")}`;
        }

        function playPause() {
            if (player) {
                if (player.isPlaying) {
                    player.pause();
                } else {
                    player.play();
                }
            }
        }

        function skipForward() {
            if (player) {
                player.seek(player.getCurrentTime() + 5000);
            }
        }

        function skipBackward() {
            if (player) {
                player.seek(player.getCurrentTime() - 5000);
            }
        }

        // Initialize when page loads
        window.addEventListener("load", initPlayer);
    </script>
</body>
</html>
